name: eBay Listing Monitor

# Runs one scan pass every ~5 minutes in the cloud, independent of any local
# machine. GitHub may delay scheduled runs a few minutes under load.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allows a manual "Run workflow" button

# Never run two passes at once (protects the committed seen.db state).
concurrency:
  group: ebay-monitor
  cancel-in-progress: false

permissions:
  contents: write         # to commit the updated seen.db back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (one pass)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python ebay_monitor.py --once

      - name: Persist seen listings (only when changed)
        run: |
          if [ -n "$(git status --porcelain seen.db)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen.db
            git commit -m "chore: update seen listings [skip ci]"
            git push || (git pull --rebase --autostash && git push)
          else
            echo "No new listings; seen.db unchanged."
          fi
